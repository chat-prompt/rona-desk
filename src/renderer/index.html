<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; img-src data:; style-src 'unsafe-inline'; script-src 'self';"
    />
    <title>Rona Desk</title>
    <style>
      :root {
        --coral: #f2645c;
        --coral-dark: #c7463f;
        --coral-tint: #fdecea;
        --leaf: #7ab26e;
        --text: #2b2b2f;
        --muted: #8a8a92;
        --card-bg: #ffffff;
        --border: #ececf0;
        --bubble-bg: rgba(255, 255, 255, 0.97);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --coral-tint: #3a2422;
          --text: #f3f3f5;
          --muted: #9a9aa2;
          --card-bg: #26262b;
          --border: #34343a;
          --bubble-bg: rgba(40, 40, 46, 0.97);
        }
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        background: transparent;
        overflow: hidden;
        -webkit-user-select: none;
        user-select: none;
        font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
        color: var(--text);
      }
      #app { display: flex; flex-direction: column; height: 100%; padding: 6px 10px 12px; }
      .pet-area { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; }
      .bubble {
        max-width: 220px;
        margin-bottom: 4px;
        padding: 6px 12px;
        border-radius: 14px;
        background: var(--bubble-bg);
        font-size: 12.5px;
        line-height: 1.35;
        text-align: center;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.14);
      }
      .coco { width: 92px; height: 92px; }
      @media (prefers-reduced-motion: no-preference) {
        .coco { animation: breathe 3.6s ease-in-out infinite; }
        @keyframes breathe { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-2px); } }
      }
      .panel { flex: 1 1 auto; overflow-y: auto; margin-top: 4px; }
      .panel-card {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 14px;
        box-shadow: 0 6px 22px rgba(0, 0, 0, 0.12);
      }
      .card-head { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }
      .card-title { font-weight: 700; font-size: 14px; line-height: 1.3; }
      .card-status { color: var(--coral); font-size: 12px; white-space: nowrap; }
      .card-task {
        margin: 6px 0 10px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.4;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .badge-row { display: flex; gap: 6px; align-items: center; min-height: 22px; }
      .badge--done {
        display: inline-flex; align-items: center; gap: 4px;
        background: var(--coral); color: #fff;
        border-radius: 999px; padding: 3px 10px; font-size: 12px; font-weight: 600;
      }
      .chip {
        background: var(--coral-tint); color: var(--coral-dark);
        border-radius: 999px; padding: 3px 9px; font-size: 11px;
      }
      .counts { display: flex; gap: 12px; margin: 10px 0; font-size: 12px; color: var(--muted); }
      .counts b { color: var(--text); }
      .timeline { list-style: none; margin: 8px 0 0; padding: 8px 0 0; border-top: 1px solid var(--border); }
      .tl-item { display: grid; grid-template-columns: auto 1fr auto; gap: 8px; align-items: center; padding: 3px 0; font-size: 12px; }
      .tl-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); }
      .tl-item--done .tl-dot { background: var(--coral); }
      .tl-label em { color: var(--muted); font-style: normal; }
      .tl-time { color: var(--muted); font-size: 11px; white-space: nowrap; }
      .action-bar { display: flex; gap: 8px; margin-top: 12px; }
      .btn {
        flex: 1; padding: 8px 10px; border-radius: 10px;
        border: 1px solid var(--border); background: var(--card-bg); color: var(--text);
        font-size: 12.5px; cursor: pointer;
      }
      .btn:hover { border-color: var(--coral); }
      .btn--primary { background: var(--coral); color: #fff; border-color: var(--coral); }
      .btn--ghost { background: transparent; }
      .synced { margin-top: 8px; text-align: center; color: var(--muted); font-size: 10px; }
      .empty { text-align: center; }
      .empty-msg { color: var(--muted); font-size: 12.5px; line-height: 1.5; margin: 0 0 12px; }
      .empty-actions { display: flex; flex-direction: column; gap: 8px; }
      .token-row { display: flex; gap: 6px; }
      .token-input {
        flex: 1; padding: 7px 9px; border-radius: 9px;
        border: 1px solid var(--border); background: var(--card-bg); color: var(--text); font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script src="renderer.js"></script>
  </body>
</html>
