name: release

# 태그(v*) 푸시 시 mac .dmg/.zip 빌드 + GitHub Release 발행 (electron-updater 소스).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  build-mac:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run gen:icons
      - run: npm run build
      # identity:null (v1 ad-hoc). 서명/notarization(v2) 시 CSC_* + APPLE_* 시크릿 추가.
      - name: electron-builder (dmg/zip + publish)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --mac --arm64 --publish always
